{% load static %}
<!DOCTYPE html>
<html style="font-size: 24px;" lang="en"><head>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta charset="utf-8">
    <meta name="keywords" content="post-list">
    <meta name="description" content="">
    <title>lost-in-space</title>
    <link rel="stylesheet" href="{% static 'css/nicepage.css' %}" media="screen">
    <link rel="stylesheet" href="{% static '/css/post-list.css' %}" media="screen">
    <script class="u-script" type="text/javascript" src="{% static '/js/jquery.js' %}" defer=""></script>
    <script class="u-script" type="text/javascript" src="{% static '/js/nicepage.js' %}" defer=""></script>
    <link id="u-theme-google-font" rel="stylesheet" href="https://fonts.googleapis.com/css?family=Merriweather:300,300i,400,400i,700,700i,900,900i">
    
    
    
    <script type="application/ld+json">{
		"@context": "http://schema.org",
		"@type": "Organization",
		"name": ""
}</script>
    <meta name="theme-color" content="#73a3de">
    <meta property="og:title" content="current Research">
    <meta property="og:type" content="website">
  </head>
  <body class="u-body u-xl-mode" data-lang="en">
    {% block header %} {% include 'header.html' %} {% endblock header %}
    <section class="u-clearfix u-section-1" id="sec-58e2">
      <div class="u-clearfix u-sheet u-sheet-1">
        {% for post in post_list %}
        <div class="u-border-5 u-border-palette-3-base u-container-align-center-xl u-container-style u-expanded-width u-group u-hover-feature u-radius-25 u-shape-round u-group-1" data-href="https://www.dahlia.is/{{post.slug}}">
          <div class="u-container-layout u-valign-top-md u-valign-top-sm u-valign-top-xl u-container-layout-1"><!--post_details--><!--post_details_options_json--><!--{"source":""}--><!--/post_details_options_json--><!--blog_post-->
            <div class="u-align-left u-container-style u-post-details u-post-details-1">
              <div class="u-container-layout u-valign-bottom u-container-layout-2"><!--blog_post_header-->
                <h2 class="u-blog-control u-text u-text-1">
                  <a class="u-post-header-link" href="https://www.dahlia.is/{{post.slug}}"><!--blog_post_header_content-->{{post.title}}<!--/blog_post_header_content--></a>
                </h2><!--/blog_post_header--><!--blog_post_image-->
                <img alt="" class="u-blog-control u-expanded-width u-image u-image-default u-image-1" src="{{post.cover_photo.url}}"><!--/blog_post_image--><!--blog_post_metadata-->
                <div class="u-blog-control u-metadata u-text-grey-30 u-metadata-1"><!--blog_post_metadata_date-->
                  <span class="u-meta-date u-meta-icon"><!--blog_post_metadata_date_content-->{{post.created_on}}<!--/blog_post_metadata_date_content--></span><!--/blog_post_metadata_date--><!--blog_post_metadata_category-->
                </div><!--/blog_post_metadata--><!--blog_post_content-->
                <div class="u-align-justify u-blog-control u-post-content u-text u-text-2"><!--blog_post_content_content-->{{post.summary}}<!--/blog_post_content_content--></div><!--/blog_post_content-->
              </div>
            </div><!--/blog_post--><!--/post_details-->
          </div>
        </div>
        {% endfor %}
      </div>
      
    </section>
    
    
    {% block footer %} {% include 'footer.html' %} {% endblock footer %}
  
</body></html>
